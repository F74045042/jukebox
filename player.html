<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點唱機 ｜ 播放中</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;
    --surface:rgba(255,255,255,0.045);
    --surface-2:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.09);
    --border-strong:rgba(255,255,255,0.16);
    --text:#f3f2f7;
    --muted:#9b9aab;
    --faint:#6c6b7d;
    --accent:#8b5cf6;
    --accent-2:#ec4899;
    --grad:linear-gradient(135deg,#8b5cf6,#ec4899);
    --glow:rgba(139,92,246,0.5);
    --danger:#ff5f6d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(900px 600px at 30% -5%, #221634 0%, transparent 58%),
      radial-gradient(700px 520px at 100% 110%, #1a1026 0%, transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC', sans-serif;
    height:100vh; overflow:hidden; display:flex;
    -webkit-font-smoothing:antialiased;
  }

  .stage{
    flex:1.5; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:40px; border-right:1px solid var(--border);
  }
  /* YouTube 播放器：必須真的渲染才會出聲，鋪滿舞台放最底層，再用不透明 .stage-cover 蓋住 */
  #player{ position:absolute; inset:0; width:100%; height:100%; z-index:1; border:0; }
  .stage-cover{
    position:absolute; inset:0; z-index:2;
    background:
      radial-gradient(900px 600px at 30% -5%, #221634 0%, transparent 58%),
      radial-gradient(700px 520px at 100% 110%, #1a1026 0%, transparent 55%),
      var(--bg);
  }
  .stage > .brand, .stage > #idleView, .stage > #playingView{ position:relative; z-index:3; }

  .brand{
    position:absolute; top:28px; left:34px; z-index:4;
    font-family:'Space Grotesk', sans-serif; font-weight:700;
    font-size:20px; letter-spacing:.5px;
    background:var(--grad); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  #playingView{ display:none; flex-direction:column; align-items:center; }

  .art-wrap{ position:relative; width:330px; height:330px; }
  .art-glow{
    position:absolute; inset:-18px; border-radius:34px; z-index:-1;
    background:var(--grad); filter:blur(40px); opacity:.55;
    animation:pulse 3.5s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:.4; } 50%{ opacity:.7; } }
  .now-art{
    width:100%; height:100%; border-radius:26px; object-fit:cover;
    box-shadow:0 30px 70px -20px rgba(0,0,0,0.8);
    border:1px solid var(--border-strong);
  }
  .eq{
    position:absolute; bottom:16px; left:16px;
    display:flex; align-items:flex-end; gap:4px; height:30px;
    padding:7px 10px; border-radius:12px;
    background:rgba(10,10,15,0.55); backdrop-filter:blur(6px);
  }
  .eq span{ width:4px; border-radius:2px; background:var(--grad); height:60%; animation:eq 0.9s ease-in-out infinite; }
  .eq span:nth-child(2){ animation-delay:.2s; } .eq span:nth-child(3){ animation-delay:.45s; }
  .eq span:nth-child(4){ animation-delay:.1s; } .eq span:nth-child(5){ animation-delay:.35s; }
  @keyframes eq{ 0%,100%{ height:25%; } 50%{ height:100%; } }

  .now-title{
    margin-top:34px; font-size:27px; font-weight:700; text-align:center;
    max-width:90%; line-height:1.4;
  }
  .now-table{
    margin-top:12px; font-size:13px; font-weight:700; letter-spacing:.5px;
    color:#fff; padding:7px 18px; border-radius:999px;
    background:var(--surface-2); border:1px solid var(--border-strong);
  }

  .idle-msg{ display:none; text-align:center; color:var(--muted); flex-direction:column; align-items:center; }
  .idle-msg .icon{ font-size:60px; display:block; margin-bottom:18px; opacity:.85; }
  .idle-msg .qr-tip{ font-size:15px; margin-top:8px; color:var(--faint); }

  .controls{ margin-top:38px; display:flex; gap:14px; }
  .ctl-btn{
    padding:12px 24px; border-radius:13px; border:1px solid var(--border-strong);
    background:var(--surface); color:var(--text); font-size:14px; font-weight:700;
    cursor:pointer; transition:all .14s; backdrop-filter:blur(6px);
  }
  .ctl-btn:hover{ background:var(--surface-2); }
  .ctl-btn:active{ transform:scale(0.96); }
  .ctl-btn.skip:hover{ border-color:var(--accent); color:#c9b6ff; }
  .ctl-btn.clear:hover{ border-color:var(--danger); color:var(--danger); }

  .unlock-overlay{
    position:fixed; inset:0; z-index:100; background:rgba(8,8,12,0.94);
    backdrop-filter:blur(14px);
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; text-align:center;
  }
  .unlock-overlay .big{ font-size:54px; }
  .unlock-overlay .hint{ font-size:16px; color:var(--muted); max-width:340px; line-height:1.7; }
  .unlock-btn{
    padding:18px 44px; border-radius:16px; border:none;
    background:var(--grad); color:#fff; font-size:18px; font-weight:700; cursor:pointer;
    box-shadow:0 14px 40px -10px var(--glow); transition:transform .12s, filter .12s;
  }
  .unlock-btn:hover{ filter:brightness(1.08); }
  .unlock-btn:active{ transform:scale(0.97); }

  .sidebar{ flex:1; padding:34px 28px; overflow-y:auto; }
  .sidebar h2{
    font-size:12.5px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase;
    margin:0 0 20px; display:flex; align-items:center; gap:10px; font-weight:700;
  }
  .sidebar h2::after{ content:''; flex:1; height:1px; background:var(--border); }

  .qrow{
    display:flex; gap:13px; align-items:center; padding:10px;
    border:1px solid var(--border); border-radius:14px; margin-bottom:10px;
    background:var(--surface); transition:background .14s, border-color .14s;
  }
  .qrow:hover{ background:var(--surface-2); border-color:var(--border-strong); }
  .qrow img{ width:50px; height:50px; border-radius:10px; object-fit:cover; flex-shrink:0; }
  .qrow .num{
    width:24px; height:24px; flex-shrink:0; border-radius:8px; background:var(--surface-2);
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700;
  }
  .qrow .info{ flex:1; min-width:0; }
  .qrow .title{ font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .qrow .table{ font-size:12px; color:var(--muted); margin-top:3px; }
  .qrow .del{
    background:none; border:none; color:var(--faint); font-size:17px; cursor:pointer;
    flex-shrink:0; padding:6px; border-radius:8px; transition:all .14s;
  }
  .qrow .del:hover{ color:var(--danger); background:rgba(255,95,109,0.12); }
  .empty-q{ color:var(--faint); font-size:14px; padding:24px 0; text-align:center; }
</style>
</head>
<body>

<div class="unlock-overlay" id="unlockOverlay">
  <div class="big">🔊</div>
  <div class="hint">點一下開始播放，之後會自動接續播放佇列中的歌曲</div>
  <button class="unlock-btn" onclick="unlockAndStart()">▶ 開始播放</button>
</div>

<div class="stage">
  <div id="player"></div>
  <div class="stage-cover"></div>
  <div class="brand">🎵 點唱機</div>

  <div id="idleView" class="idle-msg">
    <span class="icon">🎤</span>
    目前沒有歌曲播放
    <div class="qr-tip">掃桌上的 QR Code，點一首你想聽的歌！</div>
  </div>

  <div id="playingView">
    <div class="art-wrap">
      <div class="art-glow"></div>
      <img class="now-art" id="nowArt" alt="">
      <div class="eq"><span></span><span></span><span></span><span></span><span></span></div>
    </div>
    <div class="now-title" id="nowTitle">—</div>
    <div class="now-table" id="nowTable">—桌 點播</div>
    <div class="controls">
      <button class="ctl-btn skip" onclick="skipCurrent()">⏭ 跳過</button>
      <button class="ctl-btn clear" onclick="clearAll()">🗑 清空佇列</button>
    </div>
  </div>
</div>

<div class="sidebar">
  <h2>接下來播放</h2>
  <div id="upNext"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz8ky7ggwMMmGFxM6N1qFan0barLR_T02vqyQT656l2wTs4yFKx0Oa5MnxZ5hhNKJL71w/exec'; // 換成你部署後的 .../exec 網址

let ytPlayer = null;
let playerReady = false;
let currentSong = null;
let started = false;
let queueCache = [];

async function api(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  for (const k in params) url.searchParams.set(k, params[k]);
  const res = await fetch(url.toString());
  return res.json();
}

// ---- YouTube IFrame API ----
function loadYT() {
  return new Promise((resolve) => {
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.body.appendChild(tag);
    window.onYouTubeIframeAPIReady = () => resolve();
  });
}

async function initPlayer() {
  await loadYT();
  // 等播放器真的 ready 後才開始輪詢，避免在尚未就緒時呼叫 loadVideoById 失敗
  return new Promise((resolve) => {
    ytPlayer = new YT.Player('player', {
      height: '100%', width: '100%',
      playerVars: { autoplay: 1, controls: 0, rel: 0, playsinline: 1 },
      events: {
        onReady: () => { playerReady = true; resolve(); },
        onStateChange: onPlayerStateChange,
        onError: onPlayerError
      }
    });
  });
}

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) {
    handleSongEnded();
  }
}

// 影片無法播放（被移除、私人、或禁止內嵌）→ 自動標記播畢並跳下一首
function onPlayerError(e) {
  if (currentSong) {
    api('markPlayed', { id: currentSong.id });
    currentSong = null;
  }
  setTimeout(tick, 600);
}

async function unlockAndStart() {
  document.getElementById('unlockOverlay').style.display = 'none';
  started = true;
  if (!ytPlayer) await initPlayer();
  // 在使用者點擊的手勢內呼叫一次 play，解鎖瀏覽器的自動播放限制（確保出聲）
  try { ytPlayer.playVideo(); } catch (e) {}
  tick();
  setInterval(tick, 5000);
}

async function handleSongEnded() {
  if (currentSong) {
    await api('markPlayed', { id: currentSong.id });
    currentSong = null;
  }
  tick();
}

async function skipCurrent() {
  if (currentSong) {
    await api('markPlayed', { id: currentSong.id });
    currentSong = null;
    tick();
  }
}

async function clearAll() {
  if (!confirm('確定要清空整個佇列嗎？')) return;
  await api('clearQueue');
  currentSong = null;
  tick();
}

// ---- 主迴圈：撈佇列，決定要播什麼 ----
async function tick() {
  try {
    const data = await api('getQueue');
    if (!data.success) return;
    queueCache = data.queue;
    renderSidebar();

    if (!currentSong) {
      const playing = queueCache.find(s => s.status === 'playing');
      const nextWaiting = queueCache.find(s => s.status === 'waiting');
      const next = playing || nextWaiting;
      if (next) {
        currentSong = next;
        showPlayingView(next);
        if (playerReady && ytPlayer && ytPlayer.loadVideoById) {
          ytPlayer.loadVideoById(next.videoId);
        }
        if (next.status !== 'playing') {
          await api('markPlaying', { id: next.id });
        }
      } else {
        showIdleView();
      }
    } else {
      // 確認目前播放的歌仍存在於佇列（沒被刪除/清空）
      const stillThere = queueCache.find(s => s.id === currentSong.id);
      if (!stillThere) {
        currentSong = null;
        if (ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
        tick();
      }
    }
  } catch (e) {}
}

function showPlayingView(song) {
  document.getElementById('idleView').style.display = 'none';
  document.getElementById('playingView').style.display = 'flex';
  document.getElementById('nowTitle').textContent = song.title;
  document.getElementById('nowTable').textContent = song.table + '桌 點播';
  const art = document.getElementById('nowArt');
  if (art) art.src = 'https://i.ytimg.com/vi/' + song.videoId + '/hqdefault.jpg';
}

function showIdleView() {
  document.getElementById('idleView').style.display = 'flex';
  document.getElementById('playingView').style.display = 'none';
}

function renderSidebar() {
  const upNext = queueCache.filter(s => !currentSong || s.id !== currentSong.id);
  const el = document.getElementById('upNext');
  if (!upNext.length) {
    el.innerHTML = '<div class="empty-q">佇列已空，等待新的點歌～</div>';
    return;
  }
  el.innerHTML = upNext.map((s, i) => `
    <div class="qrow">
      <div class="num">${i + 1}</div>
      <img src="${s.thumbnail}">
      <div class="info">
        <div class="title">${escapeHtml(s.title)}</div>
        <div class="table">${escapeHtml(String(s.table))}桌</div>
      </div>
      <button class="del" onclick="deleteSong('${s.id}')">✕</button>
    </div>
  `).join('');
}

async function deleteSong(id) {
  await api('deleteSong', { id });
  tick();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

// 頁面一載入就先把 YouTube 播放器準備好，按下「開始播放」時即可立即出聲
initPlayer();
</script>
</body>
</html>
