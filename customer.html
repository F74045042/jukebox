<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>點唱機 ｜ 點一首歌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&family=Manrope:wght@500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0e0b09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="點唱機">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="customer.webmanifest">
<style>
  :root{
    --bg:#0e0b09;
    --text:#f4ece2;
    --muted:#ab9d8c;
    --faint:#7e7060;
    --border:rgba(255,255,255,0.10);
    --border-strong:rgba(255,255,255,0.17);
    --ember:#f0743c;
    --amber:#e9b06a;
    --grad:linear-gradient(135deg,#f0a24c,#ef6a35);
    --glow:rgba(240,116,60,0.5);
    --danger:#ff6a5f;
    --gold:#f0c77e;
    --glass:linear-gradient(180deg,rgba(255,255,255,0.085),rgba(255,255,255,0.03));
    --glass-hi:linear-gradient(180deg,rgba(255,255,255,0.11),rgba(255,255,255,0.04));
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC','Manrope',sans-serif;
    min-height:100vh;
    padding-bottom:48px;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(100% 60% at 28% -10%, rgba(227,168,102,0.14) 0%, transparent 55%),
      radial-gradient(135% 55% at 50% 116%, rgba(232,110,55,0.22) 0%, transparent 60%),
      radial-gradient(80% 48% at 92% 102%, rgba(176,60,40,0.16) 0%, transparent 58%);
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .topbar{
    position:sticky; top:0; z-index:10;
    background:rgba(14,11,9,0.6);
    backdrop-filter:blur(20px) saturate(1.5);
    -webkit-backdrop-filter:blur(20px) saturate(1.5);
    border-bottom:1px solid var(--border);
    padding:16px 18px 14px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .dot{
    width:10px; height:10px; border-radius:50%; background:var(--ember);
    box-shadow:0 0 14px rgba(240,116,60,0.85); flex-shrink:0;
  }
  .brand .mark{
    font-family:'Noto Sans TC', sans-serif;
    font-weight:700; font-size:20px; letter-spacing:1px; color:var(--text);
  }
  .brand .wordmark{
    font-family:'Manrope', sans-serif; font-size:10px; letter-spacing:3px;
    color:var(--faint); align-self:flex-end; padding-bottom:4px;
  }
  .sub{ font-size:12.5px; color:var(--muted); margin-top:6px; }
  .langsw{ margin-left:auto; display:flex; gap:4px; }
  .langsw button{
    border:1px solid var(--border); background:var(--glass); color:var(--muted);
    font-size:12px; font-weight:700; padding:5px 9px; border-radius:8px; cursor:pointer; font-family:inherit;
  }
  .langsw button.active{ background:rgba(240,116,60,0.16); color:#ffb088; border-color:rgba(240,116,60,0.45); }

  .status-row{ display:flex; gap:8px; margin-top:13px; flex-wrap:wrap; }
  .pill{
    font-size:12px; padding:7px 12px; border-radius:999px;
    background:var(--glass); border:1px solid var(--border);
    color:var(--muted); display:flex; align-items:center; gap:6px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  }
  .pill b{ color:var(--text); font-weight:500; font-family:'DM Mono',monospace; font-size:12.5px; }
  .pill.warn{ border-color:rgba(240,199,126,0.45); background:rgba(240,199,126,0.1); }
  .pill.warn b{ color:var(--gold); }
  .pill.bad{ border-color:rgba(255,106,95,0.5); background:rgba(255,106,95,0.1); }
  .pill.bad b{ color:var(--danger); }

  .wrap{ padding:20px 18px; max-width:540px; margin:0 auto; }

  .tabs{
    display:flex; gap:5px; margin-bottom:18px; padding:5px;
    background:var(--glass); border:1px solid var(--border); border-radius:15px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  }
  .tab{
    flex:1; text-align:center; padding:11px 0; border-radius:11px;
    color:var(--muted); font-weight:700; font-size:14px; cursor:pointer;
    transition:all .18s ease; border:1px solid transparent;
  }
  .tab.active{
    background:rgba(240,116,60,0.17); color:#ffb088;
    border-color:rgba(240,116,60,0.48);
    box-shadow:0 0 22px -6px var(--glow);
  }

  .search-box{ display:flex; gap:9px; margin-bottom:16px; }
  input[type=text]{
    flex:1; padding:14px 15px; border-radius:13px;
    border:1px solid var(--border); background:var(--glass);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    color:var(--text); font-size:15px; font-family:inherit; transition:border-color .15s, box-shadow .15s;
  }
  input[type=text]::placeholder{ color:var(--faint); }
  input[type=text]:focus{
    outline:none; border-color:var(--ember);
    box-shadow:0 0 0 3px rgba(240,116,60,0.2);
  }
  button.go{
    padding:0 20px; border-radius:13px; border:none;
    background:var(--grad); color:#2a1206; font-weight:700; font-size:14.5px;
    cursor:pointer; white-space:nowrap; box-shadow:0 8px 24px -10px var(--glow);
    transition:transform .12s, filter .12s; font-family:inherit;
  }
  button.go:active{ transform:scale(0.96); }
  button.go:hover{ filter:brightness(1.06); }
  button.go:disabled{ opacity:0.45; }

  .empty{ text-align:center; color:var(--muted); padding:40px 12px; font-size:14px; line-height:1.9; }

  .result-card{
    display:flex; gap:13px;
    background:var(--glass);
    backdrop-filter:blur(22px) saturate(1.4); -webkit-backdrop-filter:blur(22px) saturate(1.4);
    border:1px solid var(--border-strong); border-radius:17px;
    padding:11px; margin-bottom:11px; align-items:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.22), 0 16px 36px -22px rgba(0,0,0,0.7);
    transition:transform .14s, border-color .14s, background .14s;
  }
  .result-card:hover{ transform:translateY(-1px); background:var(--glass-hi); }
  .result-card img{
    width:62px; height:62px; border-radius:12px; object-fit:cover; flex-shrink:0;
    box-shadow:0 4px 14px rgba(0,0,0,0.45);
  }
  .result-info{ flex:1; min-width:0; }
  .result-info .title{
    font-size:14.5px; font-weight:500; line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .result-info .channel{ font-size:12px; color:var(--muted); margin-top:4px; }
  .add-btn{
    flex-shrink:0; width:44px; height:44px; border-radius:13px;
    border:none; background:var(--grad); color:#2a1206;
    font-size:24px; font-weight:400; cursor:pointer; line-height:1;
    box-shadow:0 6px 18px -6px var(--glow); transition:all .14s;
  }
  .add-btn:hover{ filter:brightness(1.07); }
  .add-btn:active{ transform:scale(0.92); }
  .add-btn:disabled{ opacity:0.3; }
  body.cooling .add-btn{ opacity:0.35; pointer-events:none; }

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    background:rgba(26,19,13,0.92); color:var(--text);
    border:1px solid var(--border-strong);
    padding:13px 22px; border-radius:999px; font-size:14px; font-weight:600;
    box-shadow:0 10px 34px rgba(0,0,0,0.6); backdrop-filter:blur(12px);
    opacity:0; transition:opacity .25s ease, transform .25s ease;
    pointer-events:none; z-index:50; max-width:86vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }
  .toast.error{ background:rgba(90,28,22,0.94); border-color:rgba(255,106,95,0.5); }

  .section-title{
    font-size:12px; color:var(--muted); margin:26px 0 12px; letter-spacing:3px;
    display:flex; align-items:center; gap:12px; font-weight:700;
  }
  .section-title::after{ content:''; flex:1; height:1px; background:var(--border); }

  .now-playing{
    display:flex; gap:12px; align-items:center;
    background:linear-gradient(135deg, rgba(240,116,60,0.18), rgba(232,110,55,0.06));
    border:1px solid rgba(240,116,60,0.42); border-radius:16px;
    padding:12px; margin-bottom:18px;
  }
  .now-playing img{ width:54px; height:54px; border-radius:10px; object-fit:cover; flex-shrink:0; }
  .now-playing .npinfo{ flex:1; min-width:0; }
  .now-playing .nplabel{ font-size:11px; color:var(--ember); font-weight:700; letter-spacing:1.5px; }
  .now-playing .nptitle{ font-size:14.5px; font-weight:500; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .now-playing .npeq{ display:flex; gap:3px; align-items:flex-end; height:18px; flex-shrink:0; }
  .now-playing .npeq span{ width:3px; background:var(--ember); border-radius:2px; animation:eqc .9s ease-in-out infinite; }
  .now-playing .npeq span:nth-child(2){ animation-delay:.25s; }
  .now-playing .npeq span:nth-child(3){ animation-delay:.5s; }
  .now-playing .npeq span:nth-child(4){ animation-delay:.15s; }
  @keyframes eqc{ 0%,100%{ height:5px; } 50%{ height:16px; } }
  .now-playing .np-vote{
    flex-shrink:0; border:1px solid rgba(240,116,60,0.55); background:rgba(240,116,60,0.14);
    color:#ffb088; font-size:12.5px; font-weight:700; padding:9px 12px; border-radius:11px;
    cursor:pointer; white-space:nowrap; font-family:inherit;
  }
  .now-playing .np-vote:active{ transform:scale(0.95); }

  .queue-row{
    display:flex; gap:12px; align-items:center; padding:11px 8px;
    border-radius:12px; font-size:14px; margin-bottom:2px;
    transition:background .14s;
  }
  .queue-row.playing{ background:rgba(240,116,60,0.1); border:1px solid rgba(240,116,60,0.26); }
  .queue-row .num{
    width:28px; height:28px; border-radius:9px; background:var(--glass);
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; flex-shrink:0; font-family:'DM Mono',monospace;
    border:1px solid var(--border);
  }
  .queue-row.playing .num{ background:none; border:none; }
  .vinyl-mini{
    width:28px; height:28px; border-radius:50%; position:relative; flex-shrink:0;
    background:repeating-radial-gradient(circle at 50% 50%, #0a0a0a 0 1px, #232120 1px 2.3px);
    box-shadow:inset 0 0 7px rgba(0,0,0,0.75), 0 2px 8px rgba(0,0,0,0.5);
    animation:spin 9s linear infinite;
  }
  .vinyl-mini::after{
    content:''; position:absolute; inset:0; margin:auto;
    width:10px; height:10px; border-radius:50%;
    background:linear-gradient(135deg,#f0a24c,#ef6a35);
    box-shadow:0 0 0 1px rgba(0,0,0,0.4);
  }
  .queue-row .t{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); }
  .queue-row.playing .t{ color:var(--text); font-weight:500; }
  .queue-row .tb{ color:var(--faint); font-size:12px; flex-shrink:0; }
  .queue-row.playing .tb{ color:#ffb088; }

  .loader{ text-align:center; padding:22px; color:var(--muted); font-size:13px; }
  .spin{
    display:inline-block; width:16px; height:16px; border:2px solid var(--border);
    border-top-color:var(--ember); border-radius:50%;
    animation:spinload .7s linear infinite; vertical-align:middle; margin-right:8px;
  }
  @keyframes spinload{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="dot"></span>
    <span class="mark">點唱機</span>
    <span class="wordmark">JUKEBOX</span>
    <div class="langsw" id="langsw">
      <button data-lang="zh" onclick="setLang('zh')">中</button>
      <button data-lang="en" onclick="setLang('en')">EN</button>
      <button data-lang="ja" onclick="setLang('ja')">日</button>
    </div>
  </div>
  <div class="sub" data-i18n="sub">掃桌上 QR，點一首你想聽的歌</div>
  <div class="status-row">
    <div class="pill" id="tablePill"><span data-i18n="table">桌號</span> <b id="tableNo">--</b></div>
    <div class="pill" id="tableQuotaPill"><span data-i18n="canOrder">本桌可點</span> <b id="tableRemaining">-</b> <span data-i18n="songUnit">首</span></div>
    <div class="pill" id="quotaPill"><span data-i18n="todaySearch">今日搜尋</span> <b id="searchRemaining">-</b></div>
    <div class="pill bad" id="cooldownPill" style="display:none;"><span data-i18n="cooldown">冷卻中</span> <b id="cooldownTime">0:00</b></div>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <div class="tab active" id="tabSearch" onclick="switchTab('search')" data-i18n="tabSearch">搜尋歌曲</div>
    <div class="tab" id="tabLink" onclick="switchTab('link')" data-i18n="tabLink">貼上連結</div>
  </div>

  <div id="searchPane">
    <div class="search-box">
      <input type="text" id="searchInput" data-i18n-ph="searchPh" placeholder="輸入歌名或歌手..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="go" id="searchBtn" onclick="doSearch()" data-i18n="searchBtn">搜尋</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <div id="linkPane" style="display:none;">
    <div class="search-box">
      <input type="text" id="linkInput" data-i18n-ph="linkPh" placeholder="貼上 YouTube 影片連結...">
      <button class="go" onclick="doLinkLookup()" data-i18n="lookupBtn">查詢</button>
    </div>
    <div id="linkResult"></div>
    <div class="empty" style="padding:24px 12px;" data-i18n="linkHint">
      在 YouTube App 找到想點的歌，按「分享」→「複製連結」，貼到這裡即可，不會占用搜尋次數。
    </div>
  </div>

  <div id="nowPlaying" class="now-playing" style="display:none;"></div>

  <div class="section-title" data-i18n="upNext">目前排隊中</div>
  <div id="queueList"><div class="loader" data-i18n="loading">載入中...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz8ky7ggwMMmGFxM6N1qFan0barLR_T02vqyQT656l2wTs4yFKx0Oa5MnxZ5hhNKJL71w/exec'; // 換成你部署後的 .../exec 網址

// ---- 桌號處理 ----
function getTable() {
  const params = new URLSearchParams(window.location.search);
  let t = params.get('table');
  if (t) {
    localStorage.setItem('jukebox_table', t);
    return t;
  }
  return localStorage.getItem('jukebox_table') || '未指定';
}
const TABLE = getTable();
document.getElementById('tableNo').textContent = TABLE;

// ---- 多語系 ----
const I18N = {
  zh: { sub:'掃桌上 QR，點一首你想聽的歌', table:'桌號', canOrder:'本桌可點', songUnit:'首', todaySearch:'今日搜尋', cooldown:'冷卻中',
    tabSearch:'搜尋歌曲', tabLink:'貼上連結', searchPh:'輸入歌名或歌手...', searchBtn:'搜尋', linkPh:'貼上 YouTube 影片連結...', lookupBtn:'查詢',
    linkHint:'在 YouTube App 找到想點的歌，按「分享」→「複製連結」，貼到這裡即可，不會占用搜尋次數。',
    upNext:'目前排隊中', nowPlaying:'🎵 現正播放', voteBtn:'想跳過 {a}/{b}', searching:'搜尋中...', lookingUp:'查詢中...',
    noResults:'找不到符合的歌曲，換個關鍵字試試？', connFail:'連線失敗，請稍後再試', searchFail:'搜尋失敗：{e}', queueEmpty:'目前還沒有人點歌，當第一個吧！',
    loading:'載入中...', added:'🎶 已加入佇列！', dup:'這首已經在佇列中囉 🎵', cooldownWait:'冷卻中，請等 {t} 後再點',
    voteDone:'🗳 已投票（{a}/{b}）', voteSkipped:'🗳 投票通過，已跳過！', addFail:'加入失敗',
    eCooldown:'本桌已點滿，冷卻中請稍候再點', eLimit:'本桌已達點歌上限，請等播放完再點', eClosed:'目前非開放點歌時間', eBlocked:'這首歌不開放點播', eTooLong:'歌曲太長，請改點短一點的', eQuota:'今日搜尋次數已用完，請改用「貼上連結」' },
  en: { sub:'Scan the QR on your table and request a song', table:'Table', canOrder:'Can order', songUnit:'', todaySearch:'Searches left', cooldown:'Cooldown',
    tabSearch:'Search', tabLink:'Paste link', searchPh:'Song or artist...', searchBtn:'Search', linkPh:'Paste a YouTube link...', lookupBtn:'Look up',
    linkHint:'Find the song in the YouTube app, tap Share → Copy link, and paste it here. This does not use search quota.',
    upNext:'Up next', nowPlaying:'🎵 Now playing', voteBtn:'Skip {a}/{b}', searching:'Searching...', lookingUp:'Looking up...',
    noResults:'No matches, try another keyword.', connFail:'Connection failed, please try again', searchFail:'Search failed: {e}', queueEmpty:'No songs yet — be the first!',
    loading:'Loading...', added:'🎶 Added to the queue!', dup:'This song is already in the queue 🎵', cooldownWait:'Cooling down, wait {t}',
    voteDone:'🗳 Voted ({a}/{b})', voteSkipped:'🗳 Vote passed, skipped!', addFail:'Failed to add',
    eCooldown:'Table is full and cooling down, please wait', eLimit:'Table reached its limit, wait for songs to finish', eClosed:'Ordering is closed right now', eBlocked:'This song is not allowed', eTooLong:'Song too long, pick a shorter one', eQuota:"Search limit reached today, please paste a link" },
  ja: { sub:'テーブルのQRを読み取って曲をリクエスト', table:'卓番', canOrder:'リクエスト可', songUnit:'曲', todaySearch:'本日の検索', cooldown:'クールダウン',
    tabSearch:'検索', tabLink:'リンク貼付', searchPh:'曲名やアーティスト...', searchBtn:'検索', linkPh:'YouTubeのリンクを貼付...', lookupBtn:'確認',
    linkHint:'YouTubeアプリで曲を見つけ、共有→リンクをコピーしてここに貼り付け。検索回数は消費しません。',
    upNext:'再生待ち', nowPlaying:'🎵 再生中', voteBtn:'スキップ {a}/{b}', searching:'検索中...', lookingUp:'確認中...',
    noResults:'見つかりません。別のキーワードでお試しを。', connFail:'接続に失敗しました', searchFail:'検索失敗：{e}', queueEmpty:'まだリクエストがありません。最初の一曲を！',
    loading:'読み込み中...', added:'🎶 キューに追加しました！', dup:'この曲は既にリストにあります 🎵', cooldownWait:'クールダウン中、{t} お待ちください',
    voteDone:'🗳 投票しました（{a}/{b}）', voteSkipped:'🗳 可決、スキップしました！', addFail:'追加に失敗',
    eCooldown:'満杯＆クールダウン中です', eLimit:'上限に達しました。再生終了までお待ちを', eClosed:'現在リクエスト時間外です', eBlocked:'この曲はリクエストできません', eTooLong:'曲が長すぎます。短い曲を', eQuota:'本日の検索上限です。リンク貼付をご利用ください' }
};
let LANG = localStorage.getItem('jukebox_lang') || 'zh';
function t(key, params) {
  let s = (I18N[LANG] && I18N[LANG][key] != null) ? I18N[LANG][key] : (I18N.zh[key] || key);
  if (params) for (const k in params) s = s.replace('{' + k + '}', params[k]);
  return s;
}
function errMsg(data) {
  const map = { COOLDOWN:'eCooldown', LIMIT_REACHED:'eLimit', CLOSED:'eClosed', BLOCKED:'eBlocked', TOO_LONG:'eTooLong', QUOTA_EXCEEDED:'eQuota' };
  if (data.error && map[data.error]) return t(map[data.error]);
  return (LANG === 'zh' && data.message) ? data.message : t('addFail');
}
function applyLang() {
  document.documentElement.lang = (LANG === 'ja' ? 'ja' : LANG === 'en' ? 'en' : 'zh-Hant');
  document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-ph]').forEach(function (el) { el.placeholder = t(el.getAttribute('data-i18n-ph')); });
  document.querySelectorAll('#langsw button').forEach(function (b) { b.classList.toggle('active', b.getAttribute('data-lang') === LANG); });
  renderCooldown();
  renderQueue(currentQueue);
}
function setLang(l) { LANG = l; localStorage.setItem('jukebox_lang', l); applyLang(); }

// ---- 共用 ----
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { el.className = 'toast'; }, 2600);
}

async function api(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  for (const k in params) url.searchParams.set(k, params[k]);
  const res = await fetch(url.toString());
  return res.json();
}

function switchTab(name) {
  document.getElementById('tabSearch').classList.toggle('active', name === 'search');
  document.getElementById('tabLink').classList.toggle('active', name === 'link');
  document.getElementById('searchPane').style.display = name === 'search' ? '' : 'none';
  document.getElementById('linkPane').style.display = name === 'link' ? '' : 'none';
}

// ---- 冷卻倒數 ----
let cooldownRemaining = 0;
let currentQueue = [];   // 目前佇列快取，用於重複歌曲偵測與現正播放顯示
let skipNeeded = 0, skipVotes = 0, playingId = null;  // 跳過投票狀態
function fmtTime(sec) { const m = Math.floor(sec / 60), s = sec % 60; return m + ':' + String(s).padStart(2, '0'); }
function renderCooldown() {
  const pill = document.getElementById('cooldownPill');
  if (cooldownRemaining > 0) {
    pill.style.display = '';
    document.getElementById('cooldownTime').textContent = fmtTime(cooldownRemaining);
    document.body.classList.add('cooling');
  } else {
    pill.style.display = 'none';
    document.body.classList.remove('cooling');
  }
}
setInterval(() => { if (cooldownRemaining > 0) { cooldownRemaining--; renderCooldown(); } }, 1000);

// ---- 配額 / 桌況顯示 ----
async function refreshQuota() {
  try {
    const q = await api('getQuota');
    if (q.success) document.getElementById('searchRemaining').textContent = q.remaining;
  } catch (e) {}
}
function applyTableStatus(t) {
  document.getElementById('tableRemaining').textContent = t.remaining;
  document.getElementById('tableQuotaPill').className = 'pill' + (t.remaining === 0 ? ' bad' : t.remaining === 1 ? ' warn' : '');
  cooldownRemaining = t.cooldownRemaining || 0;
  renderCooldown();
}
async function refreshTableStatus() {
  try {
    const t = await api('getTableStatus', { table: TABLE });
    if (t.success) applyTableStatus(t);
  } catch (e) {}
}

// ---- 搜尋 ----
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '<div class="loader"><span class="spin"></span>' + t('searching') + '</div>';
  try {
    const data = await api('search', { query: q });
    btn.disabled = false;
    if (!data.success) {
      if (data.error === 'QUOTA_EXCEEDED') {
        resultsEl.innerHTML = '';
        showToast(t('eQuota'), true);
        switchTab('link');
      } else {
        resultsEl.innerHTML = '<div class="empty">' + t('searchFail', { e: (data.error || '') }) + '</div>';
      }
      if (data.quota) document.getElementById('searchRemaining').textContent = data.quota.remaining;
      return;
    }
    if (data.quota) document.getElementById('searchRemaining').textContent = data.quota.remaining;
    if (!data.results.length) {
      resultsEl.innerHTML = '<div class="empty">' + t('noResults') + '</div>';
      return;
    }
    resultsEl.innerHTML = data.results.map(r => `
      <div class="result-card">
        <img src="${r.thumbnail}">
        <div class="result-info">
          <div class="title">${escapeHtml(r.title)}</div>
          <div class="channel">${escapeHtml(r.channel)}</div>
        </div>
        <button class="add-btn" onclick="addToQueue(${attrJson(r.videoId)}, ${attrJson(r.title)}, ${attrJson(r.thumbnail)}, this)">＋</button>
      </div>
    `).join('');
  } catch (e) {
    btn.disabled = false;
    resultsEl.innerHTML = '<div class="empty">' + t('connFail') + '</div>';
  }
}

// ---- 貼連結 ----
async function doLinkLookup() {
  const url = document.getElementById('linkInput').value.trim();
  if (!url) return;
  const resultEl = document.getElementById('linkResult');
  resultEl.innerHTML = '<div class="loader"><span class="spin"></span>' + t('lookingUp') + '</div>';
  try {
    const data = await api('getVideoInfo', { url: url });
    if (!data.success) {
      resultEl.innerHTML = '<div class="empty">' + (data.error || t('addFail')) + '</div>';
      return;
    }
    resultEl.innerHTML = `
      <div class="result-card">
        <img src="${data.thumbnail}">
        <div class="result-info">
          <div class="title">${escapeHtml(data.title)}</div>
        </div>
        <button class="add-btn" onclick="addToQueue(${attrJson(data.videoId)}, ${attrJson(data.title)}, ${attrJson(data.thumbnail)}, this)">＋</button>
      </div>
    `;
  } catch (e) {
    resultEl.innerHTML = '<div class="empty">' + t('connFail') + '</div>';
  }
}

// ---- 加入佇列 ----
// 樂觀更新：在佇列尾端暫時插入一列，讓使用者按下立即看到
function appendOptimisticRow(title) {
  const el = document.getElementById('queueList');
  if (el.querySelector('.empty')) el.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'queue-row';
  div.style.opacity = '0.55';
  div.innerHTML = '<div class="num">＋</div><div class="t">' + escapeHtml(title) +
                  '</div><div class="tb">' + escapeHtml(String(TABLE)) + '桌</div>';
  el.appendChild(div);
}

async function addToQueue(videoId, title, thumbnail, btnEl) {
  if (cooldownRemaining > 0) {
    showToast(t('cooldownWait', { t: fmtTime(cooldownRemaining) }), true);
    return;
  }
  if (currentQueue.some(s => String(s.videoId) === String(videoId))) {
    showToast(t('dup'), true);
    return;
  }
  btnEl.disabled = true;
  // 樂觀更新：立刻顯示，不等伺服器
  showToast(t('added'));
  appendOptimisticRow(title);
  try {
    const data = await api('addSong', { table: TABLE, videoId, title, thumbnail });
    if (data.success) {
      // 直接用回傳的佇列＋桌況刷新，省掉另外兩支 API
      if (data.queue) renderQueue(data.queue);
      if (data.tableStatus) applyTableStatus(data.tableStatus);
    } else {
      if (data.error === 'COOLDOWN' && data.cooldownRemaining) { cooldownRemaining = data.cooldownRemaining; renderCooldown(); }
      showToast(errMsg(data), true);
      loadQueue();          // 還原樂觀列
      btnEl.disabled = false;
    }
  } catch (e) {
    showToast(t('connFail'), true);
    loadQueue();            // 還原樂觀列
    btnEl.disabled = false;
  }
}

// ---- 佇列顯示 ----
function renderNowPlaying(queue) {
  const np = document.getElementById('nowPlaying');
  const playing = (queue || []).find(s => s.status === 'playing');
  if (!playing) { np.style.display = 'none'; playingId = null; return; }
  playingId = playing.id;
  np.style.display = 'flex';
  const right = skipNeeded > 0
    ? '<button class="np-vote" onclick="voteSkip()">' + t('voteBtn', { a: skipVotes, b: skipNeeded }) + '</button>'
    : '<div class="npeq"><span></span><span></span><span></span><span></span></div>';
  np.innerHTML = '<img src="' + (playing.thumbnail || ('https://i.ytimg.com/vi/' + playing.videoId + '/default.jpg')) + '">' +
    '<div class="npinfo"><div class="nplabel">' + t('nowPlaying') + '</div><div class="nptitle">' + escapeHtml(playing.title) + '</div></div>' +
    right;
}
function renderQueue(queue) {
  currentQueue = queue || [];
  renderNowPlaying(currentQueue);
  const el = document.getElementById('queueList');
  if (!queue || !queue.length) {
    el.innerHTML = '<div class="empty">' + t('queueEmpty') + '</div>';
    return;
  }
  el.innerHTML = queue.map((s, i) => `
    <div class="queue-row ${s.status === 'playing' ? 'playing' : ''}">
      <div class="num">${s.status === 'playing' ? '<span class="vinyl-mini"></span>' : (i + 1)}</div>
      <div class="t">${escapeHtml(s.title)}</div>
      <div class="tb">${escapeHtml(String(s.table))}桌</div>
    </div>
  `).join('');
}
async function loadQueue() {
  try {
    const data = await api('getQueue');
    if (data.success) {
      skipNeeded = data.skipVotesNeeded || 0;
      skipVotes = data.skipVotes || 0;
      renderQueue(data.queue);
    }
  } catch (e) {}
}

async function voteSkip() {
  if (!playingId) return;
  try {
    const r = await api('voteSkip', { table: TABLE, id: playingId });
    if (r.success) {
      skipVotes = r.votes;
      showToast(r.skipped ? t('voteSkipped') : t('voteDone', { a: r.votes, b: r.needed }));
      loadQueue();
    }
  } catch (e) {}
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

// 安全地把值塞進 onclick="..."（雙引號屬性）：歌名可能含撇號/引號/&
function attrJson(v) {
  return JSON.stringify(v).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

// ---- 初始化 ----
applyLang();
refreshQuota();
refreshTableStatus();
loadQueue();
setInterval(loadQueue, 6000);
setInterval(refreshTableStatus, 8000);
</script>
</body>
