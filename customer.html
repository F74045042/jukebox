<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>點唱機 ｜ 點一首歌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;
    --surface:rgba(255,255,255,0.045);
    --surface-2:rgba(255,255,255,0.08);
    --border:rgba(255,255,255,0.09);
    --border-strong:rgba(255,255,255,0.16);
    --text:#f3f2f7;
    --muted:#9b9aab;
    --faint:#6c6b7d;
    --accent:#8b5cf6;
    --accent-2:#ec4899;
    --grad:linear-gradient(135deg,#8b5cf6,#ec4899);
    --glow:rgba(139,92,246,0.45);
    --danger:#ff5f6d;
    --gold:#ffd24a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(900px 520px at 50% -8%, #221634 0%, transparent 58%),
      radial-gradient(700px 480px at 100% 100%, #1a1026 0%, transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Noto Sans TC', sans-serif;
    min-height:100vh;
    padding-bottom:48px;
    -webkit-font-smoothing:antialiased;
  }

  .topbar{
    position:sticky; top:0; z-index:10;
    background:rgba(10,10,15,0.72);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border-bottom:1px solid var(--border);
    padding:16px 18px 14px;
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand .mark{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700; font-size:21px; letter-spacing:.5px;
    background:var(--grad); -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .brand .sub{ font-size:12.5px; color:var(--muted); }

  .status-row{ display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .pill{
    font-size:12px; padding:7px 12px; border-radius:999px;
    background:var(--surface); border:1px solid var(--border);
    color:var(--muted); display:flex; align-items:center; gap:6px;
    backdrop-filter:blur(6px);
  }
  .pill b{ color:var(--text); font-weight:700; }
  .pill.warn{ border-color:rgba(255,210,74,0.4); }
  .pill.warn b{ color:var(--gold); }
  .pill.bad{ border-color:rgba(255,95,109,0.45); }
  .pill.bad b{ color:var(--danger); }

  .wrap{ padding:20px 18px; max-width:540px; margin:0 auto; }

  .tabs{
    display:flex; gap:5px; margin-bottom:18px; padding:5px;
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
  }
  .tab{
    flex:1; text-align:center; padding:11px 0; border-radius:10px;
    color:var(--muted); font-weight:700; font-size:14px; cursor:pointer;
    transition:all .18s ease; border:1px solid transparent;
  }
  .tab.active{
    background:var(--grad); color:#fff;
    box-shadow:0 6px 20px -6px var(--glow);
  }

  .search-box{ display:flex; gap:9px; margin-bottom:16px; }
  input[type=text]{
    flex:1; padding:14px 15px; border-radius:13px;
    border:1px solid var(--border); background:var(--surface);
    color:var(--text); font-size:15px; font-family:inherit; transition:border-color .15s, box-shadow .15s;
  }
  input[type=text]::placeholder{ color:var(--faint); }
  input[type=text]:focus{
    outline:none; border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(139,92,246,0.18);
  }
  button.go{
    padding:0 20px; border-radius:13px; border:none;
    background:var(--grad); color:#fff; font-weight:700; font-size:14.5px;
    cursor:pointer; white-space:nowrap; box-shadow:0 6px 20px -8px var(--glow);
    transition:transform .12s, filter .12s;
  }
  button.go:active{ transform:scale(0.96); }
  button.go:hover{ filter:brightness(1.08); }
  button.go:disabled{ opacity:0.45; }

  .empty{ text-align:center; color:var(--muted); padding:44px 12px; font-size:14px; line-height:1.85; }
  .empty .icon{ font-size:36px; display:block; margin-bottom:12px; opacity:.9; }

  .result-card{
    display:flex; gap:13px; background:var(--surface);
    border:1px solid var(--border); border-radius:16px;
    padding:11px; margin-bottom:11px; align-items:center;
    transition:transform .14s, border-color .14s, background .14s;
  }
  .result-card:hover{ transform:translateY(-1px); border-color:var(--border-strong); background:var(--surface-2); }
  .result-card img{
    width:62px; height:62px; border-radius:11px; object-fit:cover; flex-shrink:0;
    box-shadow:0 4px 14px rgba(0,0,0,0.4);
  }
  .result-info{ flex:1; min-width:0; }
  .result-info .title{
    font-size:14.5px; font-weight:500; line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .result-info .channel{ font-size:12px; color:var(--muted); margin-top:4px; }
  .add-btn{
    flex-shrink:0; width:44px; height:44px; border-radius:13px;
    border:none; background:var(--surface-2); color:var(--text);
    font-size:24px; font-weight:400; cursor:pointer; line-height:1;
    border:1px solid var(--border-strong); transition:all .14s;
  }
  .add-btn:hover{ background:var(--grad); border-color:transparent; color:#fff; }
  .add-btn:active{ transform:scale(0.92); }
  .add-btn:disabled{ opacity:0.3; }

  .toast{
    position:fixed; bottom:26px; left:50%; transform:translateX(-50%);
    background:rgba(28,24,40,0.92); color:var(--text);
    border:1px solid var(--border-strong);
    padding:13px 22px; border-radius:999px; font-size:14px; font-weight:600;
    box-shadow:0 10px 34px rgba(0,0,0,0.55); backdrop-filter:blur(10px);
    opacity:0; transition:opacity .25s ease, transform .25s ease;
    pointer-events:none; z-index:50; max-width:86vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }
  .toast.error{ background:rgba(120,30,40,0.92); border-color:rgba(255,95,109,0.5); }

  .section-title{
    font-size:12.5px; color:var(--muted); margin:26px 0 12px; letter-spacing:1.5px;
    text-transform:uppercase; display:flex; align-items:center; gap:10px; font-weight:700;
  }
  .section-title::after{ content:''; flex:1; height:1px; background:var(--border); }

  .queue-row{
    display:flex; gap:11px; align-items:center; padding:11px 0;
    border-bottom:1px solid var(--border); font-size:14px;
  }
  .queue-row:last-child{ border-bottom:none; }
  .queue-row .num{
    width:24px; height:24px; border-radius:8px; background:var(--surface-2);
    color:var(--muted); display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; flex-shrink:0;
  }
  .queue-row.playing .num{ background:var(--grad); color:#fff; box-shadow:0 2px 10px -2px var(--glow); }
  .queue-row .t{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .queue-row.playing .t{ color:#fff; font-weight:500; }
  .queue-row .tb{ color:var(--muted); font-size:12px; flex-shrink:0; }

  .loader{ text-align:center; padding:22px; color:var(--muted); font-size:13px; }
  .spin{
    display:inline-block; width:16px; height:16px; border:2px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mark">🎵 點唱機</span>
    <span class="sub">掃桌上 QR 點一首你想聽的歌</span>
  </div>
  <div class="status-row">
    <div class="pill" id="tablePill">桌號：<b id="tableNo">--</b></div>
    <div class="pill" id="tableQuotaPill">本桌可點：<b id="tableRemaining">-</b> 首</div>
    <div class="pill" id="quotaPill">今日搜尋剩餘：<b id="searchRemaining">-</b> 次</div>
  </div>
</div>

<div class="wrap">
  <div class="tabs">
    <div class="tab active" id="tabSearch" onclick="switchTab('search')">🔍 搜尋歌曲</div>
    <div class="tab" id="tabLink" onclick="switchTab('link')">🔗 貼上連結</div>
  </div>

  <div id="searchPane">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="輸入歌名或歌手..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="go" id="searchBtn" onclick="doSearch()">搜尋</button>
    </div>
    <div id="searchResults"></div>
  </div>

  <div id="linkPane" style="display:none;">
    <div class="search-box">
      <input type="text" id="linkInput" placeholder="貼上 YouTube 影片連結...">
      <button class="go" onclick="doLinkLookup()">查詢</button>
    </div>
    <div id="linkResult"></div>
    <div class="empty" style="padding:24px 12px;">
      <span class="icon">💡</span>
      在 YouTube App 找到想點的歌，按「分享」→「複製連結」，貼到這裡即可，不會占用搜尋次數。
    </div>
  </div>

  <div class="section-title">目前排隊中</div>
  <div id="queueList"><div class="loader">載入中...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz8ky7ggwMMmGFxM6N1qFan0barLR_T02vqyQT656l2wTs4yFKx0Oa5MnxZ5hhNKJL71w/exec'; // 換成你部署後的 .../exec 網址

// ---- 桌號處理 ----
function getTable() {
  const params = new URLSearchParams(window.location.search);
  let t = params.get('table');
  if (t) {
    localStorage.setItem('jukebox_table', t);
    return t;
  }
  return localStorage.getItem('jukebox_table') || '未指定';
}
const TABLE = getTable();
document.getElementById('tableNo').textContent = TABLE;

// ---- 共用 ----
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { el.className = 'toast'; }, 2600);
}

async function api(action, params = {}) {
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  for (const k in params) url.searchParams.set(k, params[k]);
  const res = await fetch(url.toString());
  return res.json();
}

function switchTab(name) {
  document.getElementById('tabSearch').classList.toggle('active', name === 'search');
  document.getElementById('tabLink').classList.toggle('active', name === 'link');
  document.getElementById('searchPane').style.display = name === 'search' ? '' : 'none';
  document.getElementById('linkPane').style.display = name === 'link' ? '' : 'none';
}

// ---- 配額 / 桌況顯示 ----
async function refreshQuota() {
  try {
    const q = await api('getQuota');
    if (q.success) document.getElementById('searchRemaining').textContent = q.remaining;
  } catch (e) {}
}
async function refreshTableStatus() {
  try {
    const t = await api('getTableStatus', { table: TABLE });
    if (t.success) {
      document.getElementById('tableRemaining').textContent = t.remaining;
      document.getElementById('tableQuotaPill').className = 'pill' + (t.remaining === 0 ? ' bad' : t.remaining === 1 ? ' warn' : '');
    }
  } catch (e) {}
}

// ---- 搜尋 ----
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  const resultsEl = document.getElementById('searchResults');
  resultsEl.innerHTML = '<div class="loader"><span class="spin"></span>搜尋中...</div>';
  try {
    const data = await api('search', { query: q });
    btn.disabled = false;
    if (!data.success) {
      if (data.error === 'QUOTA_EXCEEDED') {
        resultsEl.innerHTML = '';
        showToast(data.message, true);
        switchTab('link');
      } else {
        resultsEl.innerHTML = '<div class="empty">搜尋失敗：' + (data.error || '未知錯誤') + '</div>';
      }
      if (data.quota) document.getElementById('searchRemaining').textContent = data.quota.remaining;
      return;
    }
    if (data.quota) document.getElementById('searchRemaining').textContent = data.quota.remaining;
    if (!data.results.length) {
      resultsEl.innerHTML = '<div class="empty">找不到符合的歌曲，換個關鍵字試試？</div>';
      return;
    }
    resultsEl.innerHTML = data.results.map(r => `
      <div class="result-card">
        <img src="${r.thumbnail}">
        <div class="result-info">
          <div class="title">${escapeHtml(r.title)}</div>
          <div class="channel">${escapeHtml(r.channel)}</div>
        </div>
        <button class="add-btn" onclick='addToQueue(${JSON.stringify(r.videoId)}, ${JSON.stringify(r.title)}, ${JSON.stringify(r.thumbnail)}, this)'>＋</button>
      </div>
    `).join('');
  } catch (e) {
    btn.disabled = false;
    resultsEl.innerHTML = '<div class="empty">連線失敗，請稍後再試</div>';
  }
}

// ---- 貼連結 ----
async function doLinkLookup() {
  const url = document.getElementById('linkInput').value.trim();
  if (!url) return;
  const resultEl = document.getElementById('linkResult');
  resultEl.innerHTML = '<div class="loader"><span class="spin"></span>查詢中...</div>';
  try {
    const data = await api('getVideoInfo', { url: url });
    if (!data.success) {
      resultEl.innerHTML = '<div class="empty">' + (data.error || '查詢失敗') + '</div>';
      return;
    }
    resultEl.innerHTML = `
      <div class="result-card">
        <img src="${data.thumbnail}">
        <div class="result-info">
          <div class="title">${escapeHtml(data.title)}</div>
        </div>
        <button class="add-btn" onclick='addToQueue(${JSON.stringify(data.videoId)}, ${JSON.stringify(data.title)}, ${JSON.stringify(data.thumbnail)}, this)'>＋</button>
      </div>
    `;
  } catch (e) {
    resultEl.innerHTML = '<div class="empty">連線失敗，請稍後再試</div>';
  }
}

// ---- 加入佇列 ----
async function addToQueue(videoId, title, thumbnail, btnEl) {
  btnEl.disabled = true;
  try {
    const data = await api('addSong', { table: TABLE, videoId, title, thumbnail });
    if (data.success) {
      showToast('🎶 已加入佇列！排在第 ' + data.position + ' 位');
      refreshTableStatus();
      loadQueue();
    } else {
      showToast(data.message || data.error || '加入失敗', true);
      btnEl.disabled = false;
    }
  } catch (e) {
    showToast('連線失敗，請稍後再試', true);
    btnEl.disabled = false;
  }
}

// ---- 佇列顯示 ----
async function loadQueue() {
  try {
    const data = await api('getQueue');
    const el = document.getElementById('queueList');
    if (!data.success || !data.queue.length) {
      el.innerHTML = '<div class="empty"><span class="icon">🎤</span>目前還沒有人點歌，當第一個吧！</div>';
      return;
    }
    el.innerHTML = data.queue.map((s, i) => `
      <div class="queue-row ${s.status === 'playing' ? 'playing' : ''}">
        <div class="num">${s.status === 'playing' ? '▶' : i + 1}</div>
        <div class="t">${escapeHtml(s.title)}</div>
        <div class="tb">${escapeHtml(String(s.table))}桌</div>
      </div>
    `).join('');
  } catch (e) {}
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : str;
  return div.innerHTML;
}

// ---- 初始化 ----
refreshQuota();
refreshTableStatus();
loadQueue();
setInterval(loadQueue, 6000);
setInterval(refreshTableStatus, 8000);
</script>
</body>
</html>
